name: flutter_chat_module
description: Flutter chat UI module compiled to AAR and consumed by the React Native SDK.
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.22.0'

flutter:
  module:
    androidX: true
    androidPackage: com.flutterchat.module
    iosBundleIdentifier: com.flutterchat.module

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
