name: Build & Publish SDK

on:
  push:
    branches: [main]
    paths:
      - 'flutter_chat_module/**'
      - '!flutter_chat_module/**.md'

jobs:
  build-and-publish:
    name: AAR → SDK → npm
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # ── 2. Java ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_chat_module
        run: flutter pub get

      # ── 4. Build AAR ──────────────────────────────────────────────────────
      - name: Build Flutter AAR
        working-directory: flutter_chat_module
        run: |
          flutter build aar \
            --no-profile \
            --no-debug \
            --build-number ${{ github.run_number }}

      # ── 5. Copy AARs → SDK ────────────────────────────────────────────────
      - name: Copy AARs to SDK libs
        run: |
          LIBS="react-native-flutter-chat/android/libs"
          mkdir -p "$LIBS"

          # Copy all generated AARs
          find flutter_chat_module/build/host/outputs/repo \
            -name "*.aar" -exec cp {} "$LIBS/" \;

          # Copy the full Maven repo (flutter_embedding + plugins)
          cp -r flutter_chat_module/build/host/outputs/repo \
            "$LIBS/flutter_repo"

          echo "── AARs in $LIBS ──"
          find "$LIBS" -name "*.aar"

      # ── 6. Bump version ───────────────────────────────────────────────────
      - name: Bump patch version
        id: version
        working-directory: react-native-flutter-chat
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      # ── 7. Commit & tag ───────────────────────────────────────────────────
      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: release ${{ steps.version.outputs.new_version }} [skip ci]"
          git tag "${{ steps.version.outputs.new_version }}"
          git push origin main --follow-tags

      # ── 8. Publish npm ────────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: npm publish
        working-directory: react-native-flutter-chat
        run: |
          npm ci
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 9. GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: ${{ steps.version.outputs.new_version }}
          body: |
            ### Automated Release
            Triggered by Flutter source change on `main`.

            **Commit:** ${{ github.sha }}
            **Build:** #${{ github.run_number }}

            ```bash
            npm update react-native-flutter-chat
            ```
