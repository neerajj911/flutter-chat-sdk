name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]
      notes:
        description: 'Release notes'
        required: false
        default: 'Manual release'

jobs:
  manual-release:
    name: Manual Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_chat_module
        run: flutter pub get

      - name: Build Flutter AAR
        working-directory: flutter_chat_module
        run: |
          flutter build aar --no-profile --no-debug \
            --build-number ${{ github.run_number }}

      - name: Copy AARs to SDK
        run: |
          LIBS="react-native-flutter-chat/android/libs"
          mkdir -p "$LIBS"
          find flutter_chat_module/build/host/outputs/repo \
            -name "*.aar" -exec cp {} "$LIBS/" \;
          cp -r flutter_chat_module/build/host/outputs/repo "$LIBS/flutter_repo"

      - name: Bump ${{ github.event.inputs.bump }} version
        id: version
        working-directory: react-native-flutter-chat
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version ${{ github.event.inputs.bump }} --no-git-tag-version)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: release ${{ steps.version.outputs.new_version }} [skip ci]"
          git tag "${{ steps.version.outputs.new_version }}"
          git push origin main --follow-tags

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: npm publish
        working-directory: react-native-flutter-chat
        run: |
          npm ci
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: ${{ steps.version.outputs.new_version }}
          body: |
            ### Release Notes
            ${{ github.event.inputs.notes }}

            **By:** @${{ github.actor }} | **Build:** #${{ github.run_number }}
