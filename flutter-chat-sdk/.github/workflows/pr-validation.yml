name: PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'flutter_chat_module/**'
      - 'react-native-flutter-chat/**'
      - 'RNDemoApp/**'

jobs:
  validate-flutter:
    name: Flutter Analyze & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_chat_module
        run: flutter pub get

      - name: Flutter analyze
        working-directory: flutter_chat_module
        run: flutter analyze

      - name: Flutter test
        working-directory: flutter_chat_module
        run: flutter test

      - name: Build AAR (validation)
        working-directory: flutter_chat_module
        run: flutter build aar --no-profile --no-debug --build-number 0

      - name: PR comment on success
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Flutter AAR build passed. Safe to merge. Run the "Release SDK" workflow to create a new tagged GitHub release.'
            })
