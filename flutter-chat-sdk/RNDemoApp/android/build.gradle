buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion     = 21
        compileSdkVersion = 34
        targetSdkVersion  = 34
        ndkVersion        = "25.1.8937393"
        kotlinVersion     = "1.9.22"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

// Make the Flutter local Maven repo visible to ALL subprojects (SDK included)
allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://jitpack.io" }

        // Flutter AAR repo built by `flutter build aar`
        maven {
            url "${rootProject.projectDir}/../../react-native-flutter-chat/android/libs/flutter_repo"
        }
    }
}
