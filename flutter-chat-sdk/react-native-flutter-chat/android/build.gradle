buildscript {
    ext.kotlin_version = '1.9.22'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    compileSdk 34
    namespace 'com.flutterchat.sdk'

    defaultConfig {
        minSdk 24
        targetSdk 34
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

repositories {
    google()
    mavenCentral()
    // uri() is mandatory on Windows — raw strings produce invalid Maven URLs
    maven {
        url uri("$projectDir/libs/flutter_repo")
    }
    // Flutter engine — must come from storage.googleapis.com NOT jitpack
    maven {
        url "https://storage.googleapis.com/download.flutter.io"
    }
}

dependencies {
    implementation 'com.facebook.react:react-android:+'
    // Version matches --build-number 1 in CI (Flutter AAR Maven version = build number)
    implementation 'com.flutterchat.module:flutter_release:1'
}