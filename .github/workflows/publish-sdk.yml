name: Release SDK

# How to release a new version:
# 1. Go to GitHub -> Actions -> "Release SDK" -> Run workflow
# 2. Enter the version tag, e.g.  v1.2.0
# 3. CI builds the Flutter AAR, commits it, tags the repo, creates a GitHub Release
# 4. Consumers install with:  npm install github:<owner>/<repo>#v1.2.0

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create (e.g. v1.2.0)'
        required: true
      notes:
        description: 'Release notes (shown in the GitHub Release)'
        required: false
        default: 'New release'

jobs:
  release:
    name: Build AAR and Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # 2. Java
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter-chat-sdk/flutter_chat_module
        run: flutter pub get

      # 4. Build Flutter AAR
      - name: Build Flutter AAR
        working-directory: flutter-chat-sdk/flutter_chat_module
        run: |
          flutter build aar \
            --no-profile \
            --no-debug \
            --build-number 1

      # 5. Copy AARs + full Maven repo into SDK libs
      #    Both are committed so GitHub-based installs include all build artifacts.
      - name: Copy AARs to SDK libs
        run: |
          LIBS="flutter-chat-sdk/react-native-flutter-chat/android/libs"
          mkdir -p "$LIBS"

          # Copy individual AARs (flat)
          find flutter-chat-sdk/flutter_chat_module/build/host/outputs/repo \
            -name "*.aar" -exec cp {} "$LIBS/" \;

          # Copy full Maven repo (required by android/build.gradle)
          rm -rf "$LIBS/flutter_repo"
          cp -r flutter-chat-sdk/flutter_chat_module/build/host/outputs/repo \
            "$LIBS/flutter_repo"

          echo "AARs in $LIBS:"
          find "$LIBS" -name "*.aar"

      # 6. Set version in package.json to match the requested tag
      - name: Set version in package.json
        working-directory: flutter-chat-sdk/react-native-flutter-chat
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Strip leading 'v' for the semver field (v1.2.0 -> 1.2.0)
          PKG_VERSION="${VERSION#v}"
          npm version "$PKG_VERSION" --no-git-tag-version

      # 7. Commit built artifacts + tag
      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git add .
          git commit -m "chore: release ${{ github.event.inputs.version }} [skip ci]"
          git tag "${{ github.event.inputs.version }}"
          git pull --rebase origin main
          git push origin main --follow-tags

      # 8. Create GitHub Release with install instructions
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          body: |
            ${{ github.event.inputs.notes }}

            ---
            **Install this version:**
            ```bash
            # npm
            npm install github:${{ github.repository }}#${{ github.event.inputs.version }}

            # yarn
            yarn add github:${{ github.repository }}#${{ github.event.inputs.version }}
            ```

            **Or pin it in package.json:**
            ```json
            "react-native-flutter-chat": "github:${{ github.repository }}#${{ github.event.inputs.version }}"
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
